name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: ruff check
        run: uv run ruff check .

      - name: ruff format --check
        run: uv run ruff format --check .

  security:
    name: Security scan (bandit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      # Config (skips + rationale for the repo-wide false positives) lives in
      # pyproject.toml's [tool.bandit] table. The few remaining true
      # positives bandit's heuristics would otherwise flag are suppressed
      # inline with `# nosec BXXX` comments explaining why, right at each
      # site -- see m365_openai_proxy.py.
      - name: bandit
        run: uv run bandit -c pyproject.toml m365_openai_proxy.py

  test:
    name: Tests (pytest, Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      # The offline suite in tests/ drives the proxy's real HTTP handler with
      # every network call stubbed -- no live Microsoft credentials, no quota.
      - name: pytest
        run: uv run --python ${{ matrix.python-version }} pytest -q

  compatibility:
    name: Smoke test (${{ matrix.os }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Supported Python range on Linux, the cheapest/fastest runner.
          - { os: ubuntu-latest, python-version: "3.11" }
          - { os: ubuntu-latest, python-version: "3.12" }
          - { os: ubuntu-latest, python-version: "3.13" }
          # The README's whole pitch is "drop this one file onto any machine
          # with a Python 3 interpreter" -- sanity-check the oldest and
          # newest supported interpreters on macOS and Windows too. This job
          # deliberately uses a bare interpreter (no uv, no pip install) to
          # prove the proxy runs with nothing installed.
          - { os: macos-latest, python-version: "3.11" }
          - { os: macos-latest, python-version: "3.13" }
          - { os: windows-latest, python-version: "3.11" }
          - { os: windows-latest, python-version: "3.13" }
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      # The script is stdlib-only by design (see README's "Requirements"
      # section) -- no `pip install` step here on purpose.
      - name: Compile check
        run: python -m py_compile m365_openai_proxy.py

      # Imports the module (exercising the pure-Python AES-256-GCM
      # self-check assertion) and validates argument parsing.
      - name: Run --help
        run: python m365_openai_proxy.py --help
