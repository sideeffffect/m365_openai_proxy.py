name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install ruff
        run: python -m pip install --upgrade ruff

      - name: ruff check
        run: ruff check .

      - name: ruff format --check
        run: ruff format --check .

  security:
    name: Security scan (bandit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install bandit
        run: python -m pip install --upgrade bandit

      # Config (skips + rationale for the repo-wide false positives) lives in
      # pyproject.toml's [tool.bandit] table. The few remaining true
      # positives bandit's heuristics would otherwise flag are suppressed
      # inline with `# nosec BXXX` comments explaining why, right at each
      # site -- see m365_openai_proxy.py.
      - name: bandit
        run: bandit -c pyproject.toml m365_openai_proxy.py

  compatibility:
    name: Smoke test (${{ matrix.os }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Full Python support range on Linux, the cheapest/fastest runner.
          - { os: ubuntu-latest, python-version: "3.9" }
          - { os: ubuntu-latest, python-version: "3.10" }
          - { os: ubuntu-latest, python-version: "3.11" }
          - { os: ubuntu-latest, python-version: "3.12" }
          - { os: ubuntu-latest, python-version: "3.13" }
          # The README's whole pitch is "drop this one file onto any machine
          # with a Python 3 interpreter" -- sanity-check the oldest and
          # newest supported interpreters on macOS and Windows too.
          - { os: macos-latest, python-version: "3.9" }
          - { os: macos-latest, python-version: "3.13" }
          - { os: windows-latest, python-version: "3.9" }
          - { os: windows-latest, python-version: "3.13" }
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      # The script is stdlib-only by design (see README's "Requirements"
      # section) -- no `pip install` step here on purpose.
      - name: Compile check
        run: python -m py_compile m365_openai_proxy.py

      # Imports the module (exercising the pure-Python AES-256-GCM
      # self-check assertion) and validates argument parsing.
      - name: Run --help
        run: python m365_openai_proxy.py --help
